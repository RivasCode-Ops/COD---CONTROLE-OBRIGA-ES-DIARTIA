name: Project Etapa on issue reopen

on:
  issues:
    types: [reopened]

permissions:
  contents: read
  issues: read
  repository-projects: write

jobs:
  set-etapa-inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          script: |
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            const projectNumber = 3;
            const etapaFieldName = "Etapa";
            const inboxOptionName = "Inbox";
            const issueNodeId = context.payload.issue.node_id;

            const q = `
              query($owner:String!, $repo:String!, $number:Int!) {
                user(login:$owner) {
                  projectV2(number:$number) {
                    id
                    fields(first:100) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                    items(first:100) {
                      nodes {
                        id
                        content {
                          ... on Issue { id number title }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(q, {
              owner: repoOwner,
              repo: repoName,
              number: projectNumber,
            });

            const project = data?.user?.projectV2;
            if (!project) {
              core.setFailed(`Projeto não encontrado para ${repoOwner} #${projectNumber}.`);
              return;
            }

            const etapaField = project.fields.nodes.find((f) => f?.name === etapaFieldName);
            if (!etapaField) {
              core.setFailed(`Campo '${etapaFieldName}' não encontrado no projeto.`);
              return;
            }

            const inboxOption = etapaField.options.find((o) => o.name === inboxOptionName);
            if (!inboxOption) {
              core.setFailed(`Opção '${inboxOptionName}' não encontrada no campo '${etapaFieldName}'.`);
              return;
            }

            let item = project.items.nodes.find((n) => n?.content?.id === issueNodeId);
            if (!item) {
              const add = await github.graphql(
                `
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input:{ projectId:$projectId, contentId:$contentId }) {
                      item { id }
                    }
                  }
                `,
                {
                  projectId: project.id,
                  contentId: issueNodeId,
                }
              );
              item = add?.addProjectV2ItemById?.item;
            }

            await github.graphql(
              `
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `,
              {
                projectId: project.id,
                itemId: item.id,
                fieldId: etapaField.id,
                optionId: inboxOption.id,
              }
            );

            core.info(`Issue #${context.payload.issue.number}: Etapa -> ${inboxOptionName}`);

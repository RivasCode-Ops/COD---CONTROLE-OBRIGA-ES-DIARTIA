name: Labels a partir do título

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("config/parametros.json", "utf8"));
            const title = context.payload.issue.title;
            const current = new Set(context.payload.issue.labels.map((l) => l.name));
            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const toAdd = [];
            for (const m of cfg.mapeamentoTituloLabel) {
              const re = new RegExp("^\\s*" + escape(m.prefixo), "i");
              if (re.test(title) && !current.has(m.label)) toAdd.push(m.label);
            }
            if (toAdd.length === 0) {
              core.info("Nenhuma label nova a aplicar.");
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: toAdd,
            });
            core.info(`Labels aplicadas: ${toAdd.join(", ")}`);
